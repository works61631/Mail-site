<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مولد التوقيع - ReNOVA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/libphonenumber-js@1.10.49/bundle/libphonenumber-min.js"></script>

    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 12px; max-width: 600px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; text-align: right; }
        input { padding: 12px; width: 100%; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: 'Montserrat', Arial, sans-serif; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        
        #signature-preview { margin-top: 30px; padding: 0; border: none; display: inline-block; direction: ltr; background: white; width: 100%; text-align: center; }
        
        button { background-color: #111; color: white; padding: 15px 30px; border: none; cursor: pointer; margin-top: 20px; font-size: 16px; border-radius: 6px; }
        button:hover { background-color: #ceb384; }
        
        .preview-name { font-family: 'Montserrat', Arial, sans-serif !important; font-weight: 700 !important; }
        .preview-job { font-family: 'Montserrat', Arial, sans-serif !important; font-weight: 600 !important; }
        .preview-text { font-family: 'Montserrat', Arial, sans-serif !important; font-weight: 500 !important; }
        .preview-arabic { font-family: 'Cairo', Tahoma, Arial, sans-serif !important; font-weight: 500 !important; }
    </style>
</head>
<body>
    <div class="box">
        <h2>مولد التوقيع المؤسسي</h2>
        <div class="input-group">
            <label>الاسم الكامل (English)</label>
            <input type="text" id="name" placeholder="Full Name" oninput="update()" dir="ltr">
        </div>
        <div class="input-group">
            <label>المسمى الوظيفي (English)</label>
            <input type="text" id="job" placeholder="Position Title" oninput="update()" dir="ltr">
        </div>
        
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <div style="display: flex; direction: ltr;">
                <input type="text" id="email-prefix" placeholder="admin" oninput="update()" style="flex: 1; border-radius: 6px 0 0 6px; border-right: none;">
                <span style="background: #f4f4f4; padding: 12px; border: 1px solid #ccc; border-left: none; border-radius: 0 6px 6px 0; font-family: 'Montserrat', sans-serif; color: #333;">@renovayemen.com</span>
            </div>
        </div>

        <div class="input-group">
            <label>رقم الهاتف</label>
            <input type="text" id="phone" placeholder="+967 784 111 400" oninput="formatPhone(this)" dir="ltr">
        </div>

        <div id="signature-preview">
            <table width="100%" height="150" cellpadding="0" cellspacing="0" border="0" style="-webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; font-family: 'Montserrat', 'Cairo', Arial, sans-serif; background-color: transparent; width: 100%; max-width: 440px; border-collapse: collapse; margin: 0 auto;" dir="ltr">
              <tr>
                <td valign="middle" align="right" style="padding-right: 15px; height: 150px;">
                  <table cellpadding="0" cellspacing="0" border="0" dir="ltr" style="width: 100%;">
                    <tr>
                      <td align="right" valign="middle" class="preview-text" style="font-size: 10px; color: #111111; padding-right: 8px; height: 20px; white-space: nowrap !important;">
                        <a id="link-phone" href="tel:+967784111400" style="font-family: 'Montserrat', Arial, sans-serif; font-weight: 500; color: #111111; text-decoration: none; white-space: nowrap !important;"><span id="display-phone" class="preview-text" style="white-space: nowrap !important;">+967 784 111 400</span></a>
                      </td>
                      <td valign="middle" width="12" align="right">
                        <img src="https://raw.githubusercontent.com/works61631/Mail-icons-/main/phone_icon.png" width="11" alt="Phone" style="display: block; border: none;" />
                      </td>
                    </tr>
                    <tr>
                      <td align="right" valign="middle" class="preview-text" style="font-size: 10px; color: #111111; padding-right: 8px; height: 20px; white-space: nowrap !important;">
                        <a id="link-email" href="mailto:admin@renovayemen.com" style="font-family: 'Montserrat', Arial, sans-serif; font-weight: 500; color: #111111; text-decoration: none; white-space: nowrap !important;"><span id="display-email">admin@renovayemen.com</span></a>
                      </td>
                      <td valign="middle" width="12" align="right">
                        <img src="https://raw.githubusercontent.com/works61631/Mail-icons-/main/Email%20icon.png" width="11" alt="Email" style="display: block; border: none;" />
                      </td>
                    </tr>
                    <tr>
                      <td align="right" valign="middle" class="preview-text" style="font-size: 10px; color: #111111; padding-right: 8px; height: 20px; white-space: nowrap !important;">
                        <a href="https://www.renovayemen.com" style="font-family: 'Montserrat', Arial, sans-serif; font-weight: 500; color: #111111; text-decoration: none; white-space: nowrap !important;">www.renovayemen.com</a>
                      </td>
                      <td valign="middle" width="12" align="right">
                        <img src="https://raw.githubusercontent.com/works61631/Mail-icons-/main/Website_icon.png" width="11" alt="Website" style="display: block; border: none;" />
                      </td>
                    </tr>
                    <tr>
                      <td align="right" valign="middle" class="preview-arabic" style="font-family: 'Cairo', Tahoma, Arial, sans-serif; font-weight: 500; font-size: 10px; color: #111111; padding-right: 8px; line-height: 15px; white-space: nowrap !important;" dir="rtl">
                        <a href="https://www.google.com/maps/search/?api=1&query=76Q3%2BQ9G%2C+%D8%B4%D8%A7%D8%B1%D8%B9+%D8%A7%D9%84%D8%AE%D9%85%D8%B3%D9%8A%D9%86%2C+Sana'a%2C+Yemen" target="_blank" style="color: #111111; text-decoration: none;">شارع الخمسين العمارة الملاصقة للبوابة<br>الرئيسية للجامعة اللبنانية الدور الخامس</a>
                      </td>
                      <td valign="middle" width="12" align="right">
                        <a href="https://www.google.com/maps/search/?api=1&query=76Q3%2BQ9G%2C+%D8%B4%D8%A7%D8%B1%D8%B9+%D8%A7%D9%84%D8%AE%D9%85%D8%B3%D9%8A%D9%86%2C+Sana'a%2C+Yemen" target="_blank" style="text-decoration: none;">
                          <img src="https://raw.githubusercontent.com/works61631/Mail-icons-/main/address_icon.png" width="11" alt="Address" style="display: block; border: none;" />
                        </a>
                      </td>
                    </tr>
                  </table>
                </td>
            
                <td valign="middle" width="2" align="center" style="height: 150px;">
                  <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="border-right: 2px solid #ceb384; width: 2px; height: 90px; font-size: 1px; line-height: 1px;"> </td>
                    </tr>
                  </table>
                </td>
            
                <td width="18" style="width: 18px; min-width: 18px; height: 150px;"> </td>
            
                <td valign="middle" align="left" style="height: 150px; padding-left: 5px; width: 140px; min-width: 140px;">
                  <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td align="left" valign="top" style="padding-bottom: 8px;">
                        <img src="https://raw.githubusercontent.com/works61631/Mail-icons-/main/Beige%20logo.png" height="23" alt="ReNOVA Advisory" style="display: block; border: none; height: 23px; width: auto;" />
                      </td>
                    </tr>
                    <tr>
                      <td align="left" id="display-name" class="preview-name" style="font-family: 'Montserrat', Arial, sans-serif; font-size: 15px; font-weight: 700; color: #111111; letter-spacing: -0.5px; white-space: nowrap !important;">
                        Full Name
                      </td>
                    </tr>
                    <tr>
                      <td align="left" id="display-job" class="preview-job" style="font-family: 'Montserrat', Arial, sans-serif; font-size: 11px; font-weight: 600; color: #ceb384; padding-top: 2px; white-space: nowrap !important;">
                        Position Title
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
        </div>
        <br>
        <button onclick="copySignature()">نسخ التوقيع</button>
    </div>

    <script>
        function formatPhone(input) {
            let val = input.value;
            
            // السماح بمسح الحقل بالكامل
            if (val === '' || val === '+') {
                input.value = val;
                update();
                return;
            }

            // تثبيت علامة الزائد كأول خانة دائماً إذا بدأ بكتابة أرقام
            if (!val.startsWith('+')) {
                val = '+' + val.replace(/\D/g, '');
            }

            // تفعيل الذكاء الاصطناعي للمكتبة لمعرفة دولة الرقم وتنسيقه فوراً
            try {
                if (typeof libphonenumber !== 'undefined') {
                    const formatter = new libphonenumber.AsYouType();
                    input.value = formatter.input(val);
                } else {
                    // حماية إضافية في حال تأخر تحميل المكتبة بسبب ضعف الإنترنت
                    input.value = val;
                }
            } catch (error) {
                input.value = val;
            }
            
            update();
        }

        function update() {
            document.getElementById('display-name').innerText = document.getElementById('name').value || "Full Name";
            document.getElementById('display-job').innerText = document.getElementById('job').value || "Position Title";
            
            let phoneVal = document.getElementById('phone').value || "+967 784 111 400";
            document.getElementById('display-phone').innerText = phoneVal;
            
            // تنظيف الرابط ليتمكن الجوال من الاتصال فوراً
            document.getElementById('link-phone').href = "tel:" + phoneVal.replace(/[\s\(\)\-]/g, '');
            
            const emailPrefix = document.getElementById('email-prefix').value || "admin";
            const fullEmail = emailPrefix + "@renovayemen.com";
            document.getElementById('display-email').innerText = fullEmail;
            document.getElementById('link-email').href = "mailto:" + fullEmail;
        }

        function copySignature() {
            const range = document.createRange();
            range.selectNode(document.getElementById('signature-preview').querySelector('table'));
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert('تم النسخ بنجاح.');
            window.getSelection().removeAllRanges();
        }
    </script>
</body>
</html>
